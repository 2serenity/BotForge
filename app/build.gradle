plugins {
    id "com.android.application"
    id "com.chaquo.python"
}

android {
    namespace "com.rofls.botforge"
    compileSdk 35

    defaultConfig {
        applicationId "com.rofls.botforge"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "0.1.0"

        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

chaquopy {
    defaultConfig {
        version = "3.11"
    }
}

dependencies {
    implementation "androidx.security:security-crypto:1.1.0"
}
