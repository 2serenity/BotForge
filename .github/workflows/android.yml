name: Android-сборка

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Настроить JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Настроить Python для Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Разрешить запуск Gradle
        run: chmod +x gradlew

      - name: Запустить unit-тесты
        run: ./gradlew testDebugUnitTest

      - name: Собрать debug APK
        run: ./gradlew assembleDebug
