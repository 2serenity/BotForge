name: Android-сборка

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Настроить JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Настроить Python для Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Разрешить запуск Gradle
        run: chmod +x gradlew

      - name: Запустить unit-тесты
        run: ./gradlew testDebugUnitTest

      - name: Собрать debug APK
        run: ./gradlew assembleDebug

      - name: Опубликовать debug APK в Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "Debug-сборка (актуальная)"
          body: "Автоматически собранный debug APK из ветки main (коммит ${{ github.sha }})."
          draft: false
          prerelease: true
          make_latest: true
          files: app/build/outputs/apk/debug/*.apk
          overwrite: true
